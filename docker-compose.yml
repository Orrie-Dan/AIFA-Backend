services:
  postgres:
    image: postgres:16
    container_name: aifa-postgres
    environment:
      POSTGRES_DB: aifa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Jtatum230100
    ports:
      - "5434:5434"
    volumes:
      - aifa_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aifa -d aifa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: aifa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aifa_pg_data:
